<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>恋爱依恋测评</title>

<style>

body{
margin:0;
font-family:-apple-system;
background:linear-gradient(135deg,#667eea,#764ba2);
color:#fff;
}

.container{
padding:20px;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
}

.card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(20px);
padding:25px;
border-radius:20px;
}

.progress{
height:6px;
background:rgba(255,255,255,0.2);
border-radius:10px;
margin-bottom:20px;
}

.bar{
height:6px;
background:#fff;
width:0%;
border-radius:10px;
transition:0.3s;
}

h2{
font-size:20px;
margin-bottom:20px;
}

.option{
padding:15px;
margin-bottom:12px;
border-radius:12px;
background:rgba(255,255,255,0.15);
text-align:center;
transition:0.2s;
}

.option:active{
transform:scale(0.95);
background:#fff;
color:#333;
}

.center{
text-align:center;
}

button{
padding:15px;
border:none;
border-radius:12px;
background:#fff;
color:#333;
width:100%;
}

</style>

</head>

<body>

<div class="container">

<div id="verify" class="card center">
<h2>输入验证码</h2>
<input id="code" placeholder="6688" style="padding:12px;width:100%;margin:15px 0;border-radius:10px;border:none;">
<button onclick="enter()">进入测试</button>
<p id="err"></p>
</div>

<div id="app" style="display:none;">
<div class="card">
<div class="progress"><div class="bar" id="bar"></div></div>
<h2 id="q"></h2>
<div id="opts"></div>
</div>
</div>

<div id="result" style="display:none;" class="container">
<div class="card">
<h2>你的依恋结果</h2>
<p id="score"></p>
<p id="desc"></p>

<div style="margin-top:20px;padding:15px;background:rgba(0,0,0,0.2);border-radius:12px;">
<p>你现在看到的，只是你的表层结果。</p>
<p>真正影响你恋爱的，是你潜意识里的依恋模式。</p>
<p style="margin-top:10px;">👇 解锁完整深度报告</p>
</div>

<button style="margin-top:20px;">🔒 解锁完整报告 ¥99</button>

</div>
</div>

</div>

<script>

let qs=[
"你会在意对方回消息速度吗？",
"对方冷淡你会不安吗？",
"你在感情里更容易？",
"被忽略你会？",
"你会变得更敏感吗？",
"你害怕失去吗？",
"对方对你好你会？",
"吵架时你会？",
"你最害怕？",
"你会委屈自己吗？",
"你会看动态吗？",
"你怕暴露脆弱吗？",
"你会脑补吗？",
"你更像？",
"你会小心翼翼吗？",
"你怕亲密吗？",
"你会内耗吗？",
"你想要？",
"你会不主动吗？",
"你缺？",
"你会受伤吗？",
"你会失去自我吗？",
"你相信被爱吗？",
"你喜欢会？",
"你怕被看穿吗？",
"你不能接受？",
"你会逃避吗？",
"你需要？",
"你爱冷淡的人吗？",
"你想变成？"
];

let index=0;
let ans=[];

function enter(){
if(code.value==="6688"){
verify.style.display="none";
app.style.display="block";
render();
}else err.innerText="验证码错误";
}

function render(){
q.innerText=`${index+1}/30  ${qs[index]}`;
opts.innerHTML="";

["A","R","F","S"].forEach(v=>{
let d=document.createElement("div");
d.className="option";
d.innerText=v;
d.onclick=()=>{
ans[index]=v;
index++;
if(index<30){
render();
bar.style.width=(index/30*100)+"%";
}else finish();
};
opts.appendChild(d);
});
}

function finish(){

let s={A:0,R:0,F:0,S:0};
ans.forEach(a=>s[a]++);

let type=Object.keys(s).reduce((a,b)=>s[a]>s[b]?a:b);

let desc={
A:"你极度渴望爱，但也极度不安。你会反复确认对方是否爱你。",
R:"你渴望亲密，但更害怕失去自由。",
F:"你温柔稳定，拥有良好关系能力。",
S:"你内心稳定，是关系中的治愈者。"
};

app.style.display="none";
result.style.display="flex";

score.innerText=`A:${s.A} R:${s.R} F:${s.F} S:${s.S}`;
document.getElementById("desc").innerText=desc[type];

}

</script>

</body>
</html>
