<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8">
<title>恋爱控制欲深度测评</title>
<style>
body {font-family: Arial; max-width:600px; margin:auto; padding:20px; background:#fafafa;}
h1{text-align:center;}
button{width:100%;padding:12px;margin:8px 0;background:#ff4d6d;color:#fff;border:none;border-radius:8px;}
input{width:100%;padding:10px;margin-top:10px;}
.box{background:#fff;padding:20px;border-radius:12px;box-shadow:0 0 10px rgba(0,0,0,0.05);}
.loading{text-align:center;font-size:18px;}
.result{line-height:1.6;}
</style>
</head>

<body>

<div id="auth" class="box">
<h2>请输入访问码</h2>
<input id="code" placeholder="输入验证码">
<button onclick="checkCode()">进入测评</button>
<p style="color:#999;">（仅限已购买用户）</p>
</div>

<div id="quiz" class="box" style="display:none;"></div>
<div id="loading" class="box loading" style="display:none;"></div>
<div id="result" class="box result" style="display:none;"></div>

<script>
function checkCode(){
  if(document.getElementById("code").value=="6688"){
    document.getElementById("auth").style.display="none";
    showQuestion();
  }else{
    alert("验证码错误");
  }
}

const questions=[
{q:"对方未及时回复，你的第一反应是？",a:[["焦虑等待",2],["偶尔查看",1],["完全不在意",0]]},
{q:"你是否会查看对方社交记录？",a:[["经常",2],["偶尔",1],["从不",0]]},
{q:"对方与异性接触，你的感受？",a:[["明显不安",2],["略微在意",1],["完全信任",0]]},
{q:"你希望关系中更多的是？",a:[["掌控",2],["平衡",1],["自由",0]]},
{q:"你会主动限制对方行为吗？",a:[["会",2],["偶尔",1],["不会",0]]},
{q:"你是否容易吃醋？",a:[["经常",2],["偶尔",1],["几乎没有",0]]},
{q:"对方行踪你在意吗？",a:[["必须知道",2],["了解即可",1],["不关注",0]]},
{q:"你是否担心被抛弃？",a:[["强烈",2],["有一点",1],["没有",0]]}
];

let i=0,score=0;

function showQuestion(){
  if(i>=questions.length){showLoading();return;}
  let q=questions[i];
  let html=`<h3>${i+1}. ${q.q}</h3>`;
  q.a.forEach(ans=>{
    html+=`<button onclick="answer(${ans[1]})">${ans[0]}</button>`;
  });
  document.getElementById("quiz").innerHTML=html;
  document.getElementById("quiz").style.display="block";
}

function answer(v){
  score+=v;
  i++;
  showQuestion();
}

function showLoading(){
  document.getElementById("quiz").style.display="none";
  document.getElementById("loading").style.display="block";
  let p=0;
  let timer=setInterval(()=>{
    p+=10;
    document.getElementById("loading").innerHTML="正在生成专属报告... "+p+"%";
    if(p>=100){clearInterval(timer);showResult();}
  },300);
}

function showResult(){
  document.getElementById("loading").style.display="none";
  document.getElementById("result").style.display="block";

  let level="",desc="";
  if(score<=5){
    level="低控制欲型";
    desc="你在关系中更注重信任与空间...";
  }else if(score<=10){
    level="平衡型";
    desc="你在意对方，同时也能保持理性...";
  }else{
    level="高控制欲型";
    desc="你在关系中容易产生占有与焦虑...";
  }

  document.getElementById("result").innerHTML=`
  <h2>你的控制欲指数报告</h2>
  <p><b>综合评分：</b>${score*5}%</p>
  <p><b>人格类型：</b>${level}</p>

  <h3>📊 情感结构分析</h3>
  <p>${desc} 你的情感模式与依附关系密切相关，往往源于安全感需求。</p>

  <h3>⚠️ 潜在风险</h3>
  <p>过强控制欲可能导致关系压迫、信任下降甚至情感疏离。</p>

  <h3>💡 优化建议</h3>
  <p>建议提升自我安全感，减少外界依赖，建立更健康的亲密边界。</p>

  <h3>📌 专属结论</h3>
  <p>你的恋爱模式具有明显特征，若能适当调整，将显著提升关系质量。</p>
  `;
}
</script>

</body>
</html>
